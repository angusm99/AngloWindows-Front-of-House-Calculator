name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "pydantic>=2.8,<3.0" "uvicorn>=0.30,<1.0" "pdfplumber>=0.11,<1.0" "python-multipart>=0.0.9,<1.0"

      - name: Import app
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); from app.main import app; print(app.title)"
